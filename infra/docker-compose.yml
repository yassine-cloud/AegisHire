services:
  redis:
    image: redis:alpine
    container_name: aegishire-redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  neo4j:
    image: neo4j:5.26-community
    container_name: aegishire_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password1234
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data: